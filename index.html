<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Plaisted — Architecture and Interiors | Perth Architect</title>
  <meta name="description" content="Studio Plaisted is an architecture and interiors practice based in East Fremantle, Western Australia. Led by architect Fiona Plaisted.">
  <meta property="og:title" content="Studio Plaisted — Architecture and Interiors">
  <meta property="og:description" content="Architecture and interiors practice based in East Fremantle, Western Australia.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://studioplaisted.com">
  <meta property="og:image" content="https://studioplaisted.com/images/hero.jpg">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Salmond';
      src: url('fonts/Salmond-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Salmond';
      src: url('fonts/Salmond-Semibold.woff') format('woff');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      cursor: pointer;
      overflow: hidden;
    }
    .splash {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }
    .splash-top {
      background: #954d14;
      height: 45%;
    }
    .splash-bottom {
      height: 55%;
      overflow: hidden;
    }
    .splash-bottom img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .dot-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 1;
      background-image: radial-gradient(circle, #0408FF 2px, transparent 2px);
      background-size: 20px 20px;
      z-index: 5;
      pointer-events: none;
    }
    .splash-wordmark {
      position: absolute;
      top: 45%;
      left: 0;
      right: 0;
      transform: translateY(-42%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      z-index: 10;
    }
    .splash-wordmark span {
      font-family: 'Salmond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      color: #FFFFFF;
      white-space: nowrap;
      line-height: 1;
      letter-spacing: 0;
    }
    .splash-wordmark .line {
      flex: 1;
      height: clamp(5px, 0.9vw, 11px);
      background: #FFFFFF;
      margin: 0 clamp(14px, 2vw, 32px);
      position: relative;
      top: clamp(-9px, -0.7vw, -4px);
      transition: flex 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  margin 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .splash.shrunk .splash-wordmark .line {
      flex: 0 0 clamp(80px, 12vw, 180px);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-top"></div>
    <div class="splash-bottom">
      <img src="images/hero.jpg" alt="Studio Plaisted">
    </div>
    <div class="dot-overlay"></div>
    <div class="splash-wordmark" role="img" aria-label="Studio Plaisted">
      <span>Studio</span>
      <div class="line"></div>
      <span>Plaisted</span>
    </div>
  </div>
  <script>
    var splash = document.querySelector('.splash');
    document.addEventListener('wheel', function(e) {
      if (e.deltaY > 0) {
        splash.classList.add('shrunk');
      } else {
        splash.classList.remove('shrunk');
      }
    });
    var touchStartY = 0;
    document.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchmove', function(e) {
      var dy = touchStartY - e.touches[0].clientY;
      if (dy > 10) {
        splash.classList.add('shrunk');
      } else if (dy < -10) {
        splash.classList.remove('shrunk');
      }
    }, { passive: true });
    document.body.addEventListener('click', function() {
      window.location.href = 'home.html';
    });
  </script>
</body>
</html>
