<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Studio Plaisted</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Salmond';
      src: url('fonts/Salmond-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #954d14;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .dot-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle, #0408FF 2px, transparent 2px);
      background-size: 20px 20px;
      opacity: 1;
      pointer-events: none;
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 10;
    }
    .logo {
      margin-bottom: 48px;
    }
    .logo img {
      height: 28px;
    }
    h1 {
      font-family: 'Salmond', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 16px;
      line-height: 1.2;
    }
    p {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    a {
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      padding-bottom: 4px;
      transition: opacity 0.3s ease;
    }
    a:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="dot-overlay"></div>
  <div class="content">
    <div class="logo">
      <img src="images/logo-white.svg" alt="Studio Plaisted">
    </div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="home.html">Back to home</a>
  </div>
</body>
</html>
